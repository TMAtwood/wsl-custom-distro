[boot]
systemd=true

[user]
default=dev

[automount]
enabled=true
# metadata: Store Linux permissions in NTFS extended attributes
# umask=22: Default permissions 755 for dirs, 644 for files
# fmask=11: Remove execute from files (security)
# dmask=22: Ensure directories get execute bit (required for cd)
options=metadata,umask=22,fmask=11,dmask=22
mountFsTab=false

[network]
generateResolvConf=false

[interop]
appendWindowsPath=true
