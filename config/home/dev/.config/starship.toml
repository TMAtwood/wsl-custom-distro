# Starship Configuration
# Optimized for Fira Nerd Font Mono Retina
# https://starship.rs/config/

# Timeout for commands executed by starship (ms)
command_timeout = 1000

# Timeout for scanning the current directory (ms)
# Increase this for large repos or slow filesystems (e.g., WSL accessing Windows files)
scan_timeout = 50

# Insert blank line between shell prompts
add_newline = true

# Custom format for the prompt
format = """
[╭─](bold blue)$time$os$username$hostname$directory$git_branch$git_status$git_state$git_metrics\
$docker_context$kubernetes$terraform$aws$azure$gcloud\
$nodejs$python$golang$java$dotnet$rust$package\
$cmd_duration$jobs$status
[╰─](bold blue)$character"""

# Right-side prompt (memory shows only when >75% used)
right_format = """$memory_usage"""

# Prompt character
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# OS indicator
[os]
disabled = false
style = "bold white"
format = "[$symbol]($style) "

[os.symbols]
Ubuntu = "🐧"
Linux = "🐧"
Windows = "🪟"
Macos = "🍎"

# Username
[username]
show_always = false
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)"

# Hostname
[hostname]
ssh_only = false
style = "bold yellow"
format = "[@$hostname]($style) "

# Directory
[directory]
truncation_length = 4
truncate_to_repo = true
style = "bold cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
read_only = " 🔒"
read_only_style = "bold red"
home_symbol = "~"

[directory.substitutions]
# Disabled - can cause rendering issues on some terminals
# "Documents" = "📄 "
# "Downloads" = "📥 "
# "Music" = "🎵 "
# "Pictures" = "🖼️ "
# "repos" = "📂 "
# "src" = "💻 "

# Git branch
[git_branch]
symbol = "🌿 "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30
truncation_symbol = "..."

# Git status
[git_status]
style = "bold yellow"
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"
untracked = "?${count}"
stashed = "📦${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Git state (rebasing, merging, etc.)
[git_state]
style = "bold yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

# Git metrics (lines added/removed)
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
only_nonzero_diffs = true

# Docker context
[docker_context]
symbol = "🐳 "
style = "bold blue"
format = "via [$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

# Kubernetes
[kubernetes]
disabled = false
symbol = "☸️ "
style = "bold blue"
format = 'on [$symbol$context( \($namespace\))]($style) '
detect_files = ["k8s", "kubernetes", "kustomization.yaml", "kustomization.yml"]
detect_folders = ["k8s", "kubernetes"]

# Terraform
[terraform]
symbol = "🏗️ "
style = "bold purple"
format = "via [$symbol$workspace]($style) "
detect_files = ["*.tf", "*.tfvars", "*.tfstate"]
detect_folders = [".terraform"]

# AWS
[aws]
symbol = "☁️ "
style = "bold yellow"
format = 'on [$symbol($profile )(\($region\) )]($style)'
disabled = false

[aws.region_aliases]
us-east-1 = "use1"
us-east-2 = "use2"
us-west-1 = "usw1"
us-west-2 = "usw2"
eu-west-1 = "euw1"
eu-central-1 = "euc1"

# Azure
[azure]
disabled = false
symbol = "Ⓐ "
style = "bold blue"
format = "on [$symbol($subscription)]($style) "

# Google Cloud
[gcloud]
disabled = false
symbol = "🌐 "
style = "bold blue"
format = 'on [$symbol$account(@$domain)(\($project\))]($style) '

# Node.js
[nodejs]
symbol = "⬢ "
style = "bold green"
format = "via [$symbol($version )]($style)"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

# Python
[python]
symbol = "🐍 "
style = "bold yellow"
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", "tox.ini"]
detect_extensions = ["py"]

# Go
[golang]
symbol = "🐹 "
style = "bold cyan"
format = "via [$symbol($version )]($style)"
detect_files = ["go.mod", "go.sum", "go.work", "glide.yaml", "Gopkg.yml", "Gopkg.lock", ".go-version"]
detect_extensions = ["go"]

# Java
[java]
symbol = "☕ "
style = "bold red"
format = "via [$symbol($version )]($style)"
detect_files = ["pom.xml", "build.gradle", "build.gradle.kts", "build.sbt", ".java-version", "deps.edn", "project.clj", "build.boot", ".sdkmanrc"]
detect_extensions = ["java", "class", "jar", "gradle", "clj", "cljc"]

# .NET
[dotnet]
symbol = "🔷 "
style = "bold purple"
format = "via [$symbol($version )($tfm )]($style)"
detect_files = ["global.json", "project.json", "Directory.Build.props", "Directory.Build.targets", "Packages.props"]
detect_extensions = ["csproj", "fsproj", "xproj", "sln"]
heuristic = true

# Rust
[rust]
symbol = "🦀 "
style = "bold red"
format = "via [$symbol($version )]($style)"
detect_files = ["Cargo.toml"]
detect_extensions = ["rs"]

# Package version
[package]
symbol = "📦 "
style = "bold 208"
format = "is [$symbol$version]($style) "
display_private = false

# Command duration
[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "took [$duration]($style) "
show_milliseconds = false
show_notifications = false

# Background jobs
[jobs]
symbol = "⚙️ "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# Exit status
[status]
disabled = false
symbol = "❌"
style = "bold red"
format = '[$symbol $status]($style) '
map_symbol = true
not_executable_symbol = "🚫"
not_found_symbol = "🔍"
sigint_symbol = "🛑"
signal_symbol = "⚡"

# Time
[time]
disabled = false
style = "bold dimmed white"
format = "[$time]($style) "
time_format = "%H:%M:%S"
utc_time_offset = "local"

# Memory usage (shows when RAM exceeds 75%)
[memory_usage]
disabled = false
symbol = "🧠 "
style = "bold yellow"
format = "$symbol[${ram_pct}]($style) "
threshold = 75

# Battery (useful for laptops)
[battery]
disabled = true
full_symbol = "🔋"
charging_symbol = "⚡"
discharging_symbol = "🪫"

[[battery.display]]
threshold = 20
style = "bold red"

[[battery.display]]
threshold = 50
style = "bold yellow"

# Shell indicator
[shell]
disabled = true
bash_indicator = "bsh"
zsh_indicator = "zsh"
powershell_indicator = "psh"
style = "dimmed white"
format = "[$indicator]($style) "

# Container/Singularity
[container]
symbol = "📦 "
style = "bold red"
format = '[$symbol \[$name\]]($style) '

# Environment variable (example for showing custom env vars)
[env_var.STARSHIP_SHELL]
disabled = true

# Sudo (shows when in sudo session)
[sudo]
disabled = false
symbol = "🔐 "
style = "bold red"
format = "[$symbol]($style)"

# Line break
[line_break]
disabled = false

# Fill (for spacing between left and right prompt)
[fill]
symbol = " "
style = "dimmed white"

# Palettes for custom colors (optional)
[palettes]
