name: Build and Test Container Image

"on":
  push:
    # Push to main is handled by build-image.yml (self-hosted build + GHCR publish).
    # CI checks run on push for feature branches and develop only.
    branches:
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Heavy image build + container-structure-tests. The image is ~36 GB and
  # CANNOT be built on a GitHub-hosted runner (disk ceiling), so it only runs
  # on the self-hosted WSL Podman host. It is gated behind the repository
  # variable SELF_HOSTED_AVAILABLE: until that runner is deployed the job is
  # SKIPPED (never queued or failed) and the ci-status gate reports green.
  # Enable it once the self-hosted runner is online:
  #   gh variable set SELF_HOSTED_AVAILABLE --body true
  # (GHCR publish is intentionally NOT here — it belongs in the deferred
  # build-image.yml per docs/runner-handoff.md §9.)
  build-and-test:
    if: ${{ vars.SELF_HOSTED_AVAILABLE == 'true' }}
    runs-on: [self-hosted, fcg-local, wsl-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for GitVersion (build.sh runs it)

      - name: Build images (podman, warm cache)
        run: bash build.sh  # builds both --target final and --target runner

      - name: Test distro image
        run: bash run_tests.sh  # tests.yaml

      - name: Test runner image
        env:
          CONFIG_FILE: tests-runner.yaml
          IMAGE_NAME: localhost/tmatwood/ubuntu-26.04-runner:current
        run: bash run_tests.sh  # tests-runner.yaml

  # Always-green status gate. Gives the workflow a single deterministic check
  # whether the self-hosted build ran (success) or was skipped (runner not
  # available); it only goes red if the self-hosted build actually failed or
  # was cancelled.
  ci-status:
    if: ${{ always() }}
    needs: [build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Report CI status
        run: |
          result='${{ needs.build-and-test.result }}'
          echo "build-and-test result: ${result}"
          if [ "${result}" = "failure" ] || [ "${result}" = "cancelled" ]; then
            echo "::error::Self-hosted build-and-test did not pass (${result})."
            exit 1
          fi
          if [ "${result}" = "skipped" ]; then
            echo "Self-hosted runner unavailable (SELF_HOSTED_AVAILABLE != 'true')."
            echo "Heavy build skipped — defaulting to green."
          else
            echo "Self-hosted build-and-test passed."
          fi
