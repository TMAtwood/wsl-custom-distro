  # ============================================================================
  # INFRASTRUCTURE AS CODE LINTING
  # ============================================================================
  # COMMIT MESSAGE LINTING
  # ============================================================================
  # EDITORCONFIG LINTING
  # ============================================================================
  # SPELLING CHECK
  # ============================================================================
  # CONTAINER STRUCTURE TESTS
  # ============================================================================
  # LARGE FILE CHECK (stricter for commits)
  # ============================================================================
